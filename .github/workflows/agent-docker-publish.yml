name: Build and publish agent image

# Builds the L1 agent container and pushes it to Docker Hub on every push to
# main (and on v* tags). Mirrors slack-alerting/.github/workflows/docker-publish.yml.
# Requires two repo secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
# (token from https://hub.docker.com/settings/security, Read/Write scope).

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "agent/**"
      - ".github/workflows/agent-docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/l1-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
