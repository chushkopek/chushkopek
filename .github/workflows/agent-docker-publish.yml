name: Build and publish agent image

# Builds the L1 agent container on every relevant change. Pushes to Docker Hub
# only when DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets are configured.
# Mirrors slack-alerting/.github/workflows/docker-publish.yml.
# Token: https://hub.docker.com/settings/security (Read/Write scope).

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "agent/**"
      - ".github/workflows/agent-docker-publish.yml"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/agent-docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: false
          tags: l1-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/l1-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Push to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
